name: Deploy Server (Supabase)

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-server.yml"
      - ".github/DEPLOY.md"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Step catalog in sync with migrations
        run: |
          npm run generate:step-definitions-migration
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Step catalog is out of sync with committed migrations."
            git status
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push

      - name: Set Edge Function secrets
        run: supabase secrets set OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Deploy Edge Functions
        run: supabase functions deploy
