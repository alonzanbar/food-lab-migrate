name: Verify step catalog

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Step catalog in sync with migrations
        run: |
          npm run generate:step-definitions-migration
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Step catalog is out of sync with committed migrations. Run: npm run generate:step-definitions-migration && git add supabase/migrations/ supabase/migrations/meta/"
            git status
            exit 1
          fi
